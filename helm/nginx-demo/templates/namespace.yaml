apiVersion: v1
kind: Namespace
metadata: 
    name: {{ .Values.namespace}}
spec:
    replicas: {{.Values.replicaCount}}
    selector:
        matchLabels:
            app: {{.Release.Name}}
    template:
        metadata:
            labels:
                app: {{.Release.Name}}
        spec:
            containers:
            - name: nginx
              image: "{{.Values.image.repository}}:{{.Values.image.tag}}"
              imagePullPolicy: {{.Values.image.pullPolicy}}
              ports:
              - containerPort: 80
              resources:
                requests:
                    cpu: "50m"
                    memory: "64Mi"
                limits:
                    cpu: "100m"
                    memory: "128Mi"
