name: CI - Build and Update Image Tag

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'VERSION'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set image tag
      id: tag
      run: |
        VERSION=$(cat VERSION)
        SHORT_SHA=${GITHUB_SHA::8}
        echo "IMAGE_TAG=${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "Building: deestar08/nginx-demo:${VERSION}-${SHORT_SHA}"

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t deestar08/nginx-demo:${{ steps.tag.outputs.IMAGE_TAG }} .

    - name: Push to Docker Hub
      run: |
        docker push deestar08/nginx-demo:${{ steps.tag.outputs.IMAGE_TAG }}

    - name: Update Helm values.yaml with new image tag
      run: |
        # Print before
        echo "=== BEFORE ==="
        cat helm/nginx-demo/values.yaml

        sed -i "s|tag:.*|tag: \"${{ steps.tag.outputs.IMAGE_TAG }}\"|" \
          helm/nginx-demo/values.yaml

        # Print after — confirm it changed
        echo "=== AFTER ==="
        cat helm/nginx-demo/values.yaml

    - name: Commit updated values.yaml
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git remote set-url origin \
          https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
        git add helm/nginx-demo/values.yaml
        git commit -m "chore: update image tag to ${{ steps.tag.outputs.IMAGE_TAG }} [skip ci]"
        git push

    - name: Install ArgoCD CLI
      run: |
        ARGOCD_VERSION=$(curl -s https://api.github.com/repos/argoproj/argo-cd/releases/latest \
          | grep '"tag_name"' | cut -d'"' -f4)
        echo "Installing ArgoCD $ARGOCD_VERSION"
        curl -sSL -o /usr/local/bin/argocd \
          https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64
        chmod +x /usr/local/bin/argocd
        argocd version --client

    - name: Login to ArgoCD
      run: |
        argocd login ${{ secrets.ARGOCD_SERVER }} \
          --username admin \
          --password ${{ secrets.ARGOCD_PASSWORD }} \
          --insecure \
          --grpc-web

    - name: Apply ArgoCD Application
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
        kubectl apply -f argocd/argocd.yaml
    
    - name: Register repo with ArgoCD
      run: |
        argocd repo add https://github.com/${{ github.repository }} \
        --username ${{ github.repository_owner }} \
        --password ${{ secrets.GIT_PAT }} \
        --insecure \
        --grpc-web \
        --upsert


    - name: Sync ArgoCD app
      run: |
        argocd app sync nginx-demo \
        --insecure \
        --grpc-web \
        --timeout 120

    - name: Verify app health
      run: |
        argocd app wait nginx-demo \
        --health \
        --timeout 120 \
        --insecure \
        --grpc-web